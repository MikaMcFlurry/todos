name: Static checks

on:
  push:
    branches:
      - codex/project-management-tool-v1-followup
    paths-ignore:
      - docs/CI_STATIC_CHECK_RESULT.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          count=0
          while IFS= read -r file; do
            node --check "$file"
            count=$((count + 1))
          done < <(find . -maxdepth 1 -type f -name '*.js' -printf '%f\n' | sort)
          echo "JS_COUNT=$count" >> "$GITHUB_ENV"
          echo "JavaScript files checked: $count"

      - name: Workspace, JSON, privacy and legacy checks
        shell: bash
        run: |
          set -euo pipefail
          node tests/v1-1-static-checks.mjs | tee /tmp/v1-1-static-check-result.json

      - name: Static HTTP load
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 8000 >/tmp/pm-tool-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          sleep 2
          files=(
            index.html
            project-data.json
            todo-data.json
            projects/project-finanztracker.json
            projects/project-management-tool.json
            styles.css
            styles-features.css
            styles-responsive.css
            styles-components.css
            styles-v1-1-polish.css
            app-core.js
            app-core-2.js
            app-core-3.js
            app-core-4.js
            app-views.js
            app-views-2.js
            app-views-3.js
            app-views-4.js
            app-views-5.js
            app-views-6.js
            app.js
            app-2.js
            app-3.js
            app-v1-1-polish.js
            service-worker.js
          )
          passed=0
          for file in "${files[@]}"; do
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' "http://127.0.0.1:8000/$file")
            test "$status" = "200"
            passed=$((passed + 1))
          done
          echo "HTTP_PASSED=$passed" >> "$GITHUB_ENV"
          echo "HTTP_TOTAL=${#files[@]}" >> "$GITHUB_ENV"
          echo "Static HTTP responses: $passed/${#files[@]} returned 200"

      - name: Report protected legacy file SHA
        shell: bash
        run: |
          set -euo pipefail
          sha=$(node - <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');
          const body = fs.readFileSync('todo-data.json');
          process.stdout.write(crypto.createHash('sha1').update(Buffer.concat([Buffer.from(`blob ${body.length}\0`), body])).digest('hex'));
          NODE
          )
          echo "TODO_SHA=$sha" >> "$GITHUB_ENV"
          echo "todo-data.json git blob SHA: $sha"
          test "$sha" = "c4bda99be81720ecaf433c5bbbe2280f7fa79673"

      - name: Write successful check report
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const workspace = JSON.parse(fs.readFileSync('/tmp/v1-1-static-check-result.json', 'utf8'));
          const report = {
            schema: 'mika-ai-project-management-static-check-result-v1',
            status: 'passed',
            checkedCommit: process.env.GITHUB_SHA,
            workflowRunId: process.env.GITHUB_RUN_ID,
            workflowRunAttempt: process.env.GITHUB_RUN_ATTEMPT,
            generatedAt: new Date().toISOString(),
            javascriptSyntax: {
              passed: Number(process.env.JS_COUNT),
              failed: 0
            },
            staticHttp: {
              passed: Number(process.env.HTTP_PASSED),
              total: Number(process.env.HTTP_TOTAL),
              failed: Number(process.env.HTTP_TOTAL) - Number(process.env.HTTP_PASSED)
            },
            workspace,
            todoDataBlobSha: process.env.TODO_SHA,
            notes: [
              'This report is written only after every preceding workflow step passed.',
              'Rendered browser acceptance on a real iPhone/iPad remains a manual check.'
            ]
          };
          fs.mkdirSync('docs', { recursive: true });
          fs.writeFileSync('docs/CI_STATIC_CHECK_RESULT.json', `${JSON.stringify(report, null, 2)}\n`);
          NODE

      - name: Commit successful check report
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/CI_STATIC_CHECK_RESULT.json
          if git diff --cached --quiet; then
            echo "Check report unchanged."
          else
            git commit -m "Record successful V1.1 static checks [skip ci]"
            git push
          fi
